name: Skill CI

on:
  push:
    paths:
      - ".github/workflows/skill-ci.yml"
      - "README.md"
      - "skills/codex-dream-skin/**"
  pull_request:
    paths:
      - ".github/workflows/skill-ci.yml"
      - "README.md"
      - "skills/codex-dream-skin/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate skill metadata and repository assets
        run: |
          python -m pip install --quiet pyyaml
          python - <<'PY'
          from pathlib import Path
          import yaml

          skill = Path("skills/codex-dream-skin/SKILL.md")
          text = skill.read_text(encoding="utf-8")
          assert text.startswith("---\n"), "SKILL.md must start with YAML frontmatter"
          frontmatter = yaml.safe_load(text.split("---", 2)[1])
          assert set(frontmatter) == {"name", "description"}
          assert frontmatter["name"] == "codex-dream-skin"
          assert frontmatter["description"].strip()

          agent = yaml.safe_load(
              Path("skills/codex-dream-skin/agents/openai.yaml").read_text(encoding="utf-8")
          )
          prompt = agent["interface"]["default_prompt"]
          assert "$codex-dream-skin" in prompt

          image_suffixes = {".png", ".jpg", ".jpeg", ".webp", ".gif"}
          images = [p for p in Path(".").rglob("*") if p.is_file() and p.suffix.lower() in image_suffixes]
          assert not images, f"Images must stay on CDN, found: {images}"

          PY

      - name: Verify World Cup display profile
        run: |
          theme_dir="$RUNNER_TEMP/world-cup-theme"
          mkdir -p "$theme_dir"
          cat > "$theme_dir/theme.json" <<'JSON'
          {
            "schemaVersion": 1,
            "name": "World Cup Victory Night",
            "appearance": "auto",
            "art": { "safeArea": "auto", "taskMode": "auto" }
          }
          JSON
          node skills/codex-dream-skin/scripts/set-world-cup-profile.mjs \
            "$theme_dir/theme.json"
          node -e '
            const theme = require(process.argv[1]);
            if (theme.appearance !== "dark") throw new Error("World Cup appearance is not dark");
            if (theme.art.safeArea !== "none") throw new Error("World Cup safe area is not none");
            if (theme.art.taskMode !== "auto") throw new Error("Existing art settings were not preserved");
          ' "$theme_dir/theme.json"
          grep -Fq '"$NODE" "$WORLD_CUP_PROFILE_SCRIPT" "$THEME_DIR/theme.json"' \
            skills/codex-dream-skin/scripts/dream-skin-macos.sh

  macos-wrapper:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - name: Parse wrapper and verify pinned runtime source
        run: |
          bash -n skills/codex-dream-skin/scripts/dream-skin-macos.sh
          runtime_cache="$RUNNER_TEMP/codex-dream-skin"
          CODEX_DREAM_SKIN_CACHE_DIR="$runtime_cache" \
            bash skills/codex-dream-skin/scripts/dream-skin-macos.sh source
          runtime_root="$(find "$runtime_cache" -maxdepth 1 -type d -name 'source-*' -print -quit)"
          test -s "$runtime_root/macos/presets/preset-midnight-aurora/theme.json"
          grep -Fq 'seed_bundled_presets' "$runtime_root/macos/scripts/install-dream-skin-macos.sh"
          grep -Fq 'switch-theme-macos.sh" --id preset-midnight-aurora' \
            "$runtime_root/macos/scripts/install-dream-skin-macos.sh"
          first_home="$RUNNER_TEMP/first-install-home"
          HOME="$first_home" NODE="$(command -v node)" bash -c '
            . "$1/macos/scripts/common-macos.sh"
            ensure_state_root
            seed_bundled_presets
            "$SCRIPT_DIR/switch-theme-macos.sh" --id preset-midnight-aurora --no-apply
            test -s "$THEME_DIR/theme.json"
          ' _ "$runtime_root"

  windows-wrapper:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Parse wrapper and verify pinned runtime source
        shell: powershell
        env:
          CODEX_DREAM_SKIN_CACHE_DIR: ${{ runner.temp }}\codex-dream-skin
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File `
            skills\codex-dream-skin\scripts\dream-skin-windows.ps1 -Action source
          $runtimeRoot = Get-ChildItem $env:CODEX_DREAM_SKIN_CACHE_DIR -Directory -Filter 'source-*' |
            Select-Object -First 1
          if ($null -eq $runtimeRoot) { throw 'Pinned Windows runtime was not downloaded.' }
          foreach ($relative in @(
            'windows\scripts\theme-windows.ps1',
            'windows\scripts\tray-dream-skin.ps1',
            'windows\assets\theme.json',
            'windows\assets\dream-reference.jpg'
          )) {
            $path = Join-Path $runtimeRoot.FullName $relative
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Required Windows theme feature is missing: $relative"
            }
          }
